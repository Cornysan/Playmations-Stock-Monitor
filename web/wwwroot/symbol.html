<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Symbol · stocks.playmations.com</title>
  <link rel="stylesheet" href="/css/app.css?v=3">
  <script src="/js/app.js?v=3"></script>
  <script src="/js/lightweight-charts.standalone.production.js"></script>
  <script defer src="/js/alpine.min.js"></script>
  <script>
    // Auf Desktop übernimmt die Split-View der Startseite die Detailansicht.
    (function () {
      if (window.matchMedia("(min-width: 1000px)").matches) {
        const sym = decodeURIComponent(location.pathname.split("/").pop());
        location.replace("/?s=" + encodeURIComponent(sym));
      }
    })();
  </script>
</head>
<body>
<div class="wrap" x-data="symbolApp()" x-init="init()">

  <header class="top">
    <a class="back" href="/">← Watchlist</a>
    <div class="spacer"></div>
    <div class="macro-chip" x-cloak x-show="macro">
      <span>Macro</span>
      <b x-text="macro?.regime"></b>
      <span class="score" :class="signClass(macro?.pillar_score)"
            x-text="fmtSigned(macro?.pillar_score)"></span>
    </div>
  </header>

  <div class="detail-head">
    <h1 x-text="symbol"></h1>
    <span class="full-name" x-text="analysis?.name || ''"></span>
    <span class="big-price" x-text="fmtPrice(lastClose)"></span>
  </div>

  <div class="toggle-row" x-cloak x-show="analysis">
    <button class="toggle" x-show="admin" :class="{ on: analysis?.holding }" @click="toggleHolding()"
            title="Umschalten: bin ich hier investiert?"></button>
    <span x-text="analysis?.holding ? 'Im Depot (Holder-Framing)' : 'Nicht im Depot (Entry-Framing)'"></span>
    <span class="stale" x-show="analysis" x-text="'· Analyse vom ' + fmtAsOf(analysis?.as_of)"></span>
  </div>

  <!-- Action banner -->
  <div class="banner" x-cloak x-show="analysis" :class="actionClass(analysis?.action)">
    <div class="action-line" :title="analysis?.action" x-text="actionLabel(analysis?.action)"></div>
    <div class="rationale" x-text="analysis?.rationale"></div>
    <div class="framing" x-text="analysis?.framing"></div>
  </div>
  <div class="banner" x-cloak x-show="analysisMissing">
    <div class="action-line">no data</div>
    <div class="framing">Das Symbol wird beim nächsten Worker-Lauf analysiert.</div>
  </div>

  <!-- Chart -->
  <div class="chart-card">
    <div class="chart-toolbar">
      <template x-for="r in ['3m','6m','1y']" :key="r">
        <button class="range-btn" :class="{ active: range === r }"
                @click="range = r; loadChart()" x-text="r.toUpperCase()"></button>
      </template>
      <div class="legend">
        <span><span class="key" style="background:#e3b341"></span>EMA20</span>
        <span><span class="key" style="background:#39c5cf"></span>EMA50</span>
        <span><span class="key" style="background:#a371f7"></span>EMA200</span>
      </div>
    </div>
    <div id="chart"></div>
  </div>

  <!-- Progressive disclosure -->
  <template x-if="analysis">
    <div>
      <div class="acc">
        <button @click="open.pillars = !open.pillars">
          <span class="chev" :class="{ open: open.pillars }">▶</span> Pillars
          <span class="summary"
                x-text="'Trend ' + fmtSigned(analysis.trend_score)
                      + ' · Momentum ' + fmtSigned(analysis.momentum_score)
                      + ' · Macro ' + fmtSigned(analysis.macro_score)
                      + ' → Total ' + fmtSigned(analysis.pillar_total)"></span>
        </button>
        <div class="body" x-cloak x-show="open.pillars">
          <div class="pillar-row">
            <span class="p-name">Trend</span>
            <span class="p-score" :class="signClass(analysis.trend_score)" x-text="fmtSigned(analysis.trend_score)"></span>
            <span class="p-detail" x-text="analysis.flags?.trend_detail"></span>
          </div>
          <div class="pillar-row">
            <span class="p-name">Momentum</span>
            <span class="p-score" :class="signClass(analysis.momentum_score)" x-text="fmtSigned(analysis.momentum_score)"></span>
            <span class="p-detail" x-text="analysis.flags?.momentum_detail"></span>
          </div>
          <div class="pillar-row">
            <span class="p-name">Macro-Sentiment</span>
            <span class="p-score" :class="signClass(analysis.macro_score)" x-text="fmtSigned(analysis.macro_score)"></span>
            <span class="p-detail" x-text="macro ? macro.regime + ' · Composite ' + macro.composite : 'injiziert aus macro_pillar.py'"></span>
          </div>
        </div>
      </div>

      <div class="acc">
        <button @click="open.flags = !open.flags">
          <span class="chev" :class="{ open: open.flags }">▶</span> Flags
          <span class="summary" x-text="flagSummary()"></span>
        </button>
        <div class="body" x-cloak x-show="open.flags">
          <div class="flag-group">
            <div class="fg-title">Exhaustion</div>
            <template x-for="f in analysis.flags?.exhaustion || []"><span class="flag exh" x-text="f"></span></template>
            <span class="flag-none" x-show="!(analysis.flags?.exhaustion || []).length">keine</span>
          </div>
          <div class="flag-group">
            <div class="fg-title">Bearish</div>
            <template x-for="f in analysis.flags?.bearish || []"><span class="flag bear" x-text="f"></span></template>
            <span class="flag-none" x-show="!(analysis.flags?.bearish || []).length">keine</span>
          </div>
          <div class="flag-group">
            <div class="fg-title">Rebound</div>
            <template x-for="f in analysis.flags?.rebound || []"><span class="flag reb" x-text="f"></span></template>
            <span class="flag-none" x-show="!(analysis.flags?.rebound || []).length">keine</span>
          </div>
          <div class="flag-group">
            <div class="fg-title">Struktur</div>
            <span class="flag bear" x-show="analysis.flags?.death_cross">aktives Death-Cross (EMA50&lt;EMA200, Preis&lt;EMA50)</span>
            <span class="flag" x-text="'Stretch über EMA20: ' + (analysis.flags?.stretch_pct ?? '?') + '%'"></span>
          </div>
        </div>
      </div>

      <div class="acc">
        <button @click="open.ind = !open.ind">
          <span class="chev" :class="{ open: open.ind }">▶</span> Rohindikatoren
          <span class="summary" x-text="analysis.indicators ? analysis.indicators.n_bars + ' Bars' : ''"></span>
        </button>
        <div class="body" x-cloak x-show="open.ind">
          <table class="kv">
            <template x-for="[k, v] in indicatorRows()" :key="k">
              <tr><td x-text="k"></td><td x-text="v"></td></tr>
            </template>
          </table>
        </div>
      </div>

      <div class="acc" x-show="macro">
        <button @click="open.macro = !open.macro">
          <span class="chev" :class="{ open: open.macro }">▶</span> Macro-Snapshot
          <span class="summary" x-text="macro ? macro.pillar_label : ''"></span>
        </button>
        <div class="body" x-cloak x-show="open.macro">
          <template x-for="c in macro?.components || []" :key="c.ratio">
            <div class="macro-comp">
              <span class="mc-sig" :class="signClass(c.signal)" x-text="c.signal != null ? (c.signal > 0 ? '+' : '') + c.signal.toFixed(2) : '—'"></span>
              <span class="mc-ratio" x-text="c.ratio"></span>
              <span class="mc-detail" x-text="c.available ? c.detail : 'keine Daten'"></span>
            </div>
          </template>
          <div class="flag-none" style="margin-top:8px" x-show="(macro?.notes || []).length">
            <template x-for="n in macro?.notes || []"><div x-text="'Hinweis: ' + n"></div></template>
          </div>
        </div>
      </div>
    </div>
  </template>

  <footer class="disclaimer">
    Mechanische Auswertung eigener Formeln — keine Finanzberatung.
  </footer>
</div>

<script>
function symbolApp() {
  return {
    ...detailState(),
    macro: null,
    admin: false,

    async init() {
      const sym = decodeURIComponent(location.pathname.split("/").pop());
      document.title = sym + " · stocks.playmations.com";
      await Promise.all([this.loadMacro(), this.loadMe(), this.show(sym)]);
    },
    async loadMacro() {
      const resp = await fetch("/api/macro");
      if (resp.ok) this.macro = await resp.json();
    },
    async loadMe() {
      const resp = await fetch("/api/me");
      if (resp.ok) this.admin = (await resp.json()).admin;
    },
  };
}
</script>
</body>
</html>
